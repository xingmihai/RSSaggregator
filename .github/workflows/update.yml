name: Update RSS Feed

on:
  schedule:
    # 每 30 分钟运行一次
    - cron: '*/30 * * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch and aggregate feeds
        run: npm run update

      - name: Copy feed to public
        run: |
          mkdir -p public/data
          cp data/feed.json public/data/feed.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/feed.json data/feed.json
          git diff --staged --quiet || git commit -m "chore: update aggregated feed [skip ci]"
          git push
